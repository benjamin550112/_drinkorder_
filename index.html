<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辦公室飲料訂購系統</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const API_URL = "https://script.google.com/macros/s/AKfycbzS8Bl7BKWbvaG2jtEG8oJa9V4r94i8M51fF4YQHg0uFpro6NGwsybyZR93mj3buRwjEA/exec";

    const { useState, useEffect } = React;

    const downloadCSV = (orders) => {
        const headers = ["訂購人", "飲料", "甜度", "冰塊", "數量", "總金額"];
        const csvRows = [headers.join(",")];
        for (const o of orders) {
            csvRows.push([o.name, o.drink, o.sugar, o.ice, o.quantity, o.totalPrice].join(","));
        }
        const csvString = csvRows.join("\n");
        const blob = new Blob(["\uFEFF" + csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.setAttribute("download", `orders_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    function App() {
      const [menu, setMenu] = useState([]);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [editingOrder, setEditingOrder] = useState(null);

      const fetchData = async () => {
        setLoading(true);
        try {
          const response = await fetch(API_URL);
          const data = await response.json();
          setMenu(data.menu || []);
          setOrders(data.orders || []);
        } catch (err) {
          setError("資料載入失敗，請稍後再試。");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      const notifySuccess = (msg) => { alert(msg); fetchData(); };
      const notifyError = (msg) => { alert("錯誤: " + msg); };

      return (
        <div className="max-w-4xl mx-auto p-4 md:p-8">
          <header className="mb-8 p-6 rounded-2xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white shadow-lg">
            <h1 className="text-3xl font-bold flex items-center gap-2">☕ 辦公室飲料訂購</h1>
            <p className="mt-2 opacity-90">今日點單統計</p>
          </header>

          {loading ? (
            <div className="flex justify-center p-10"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-sky-600"></div></div>
          ) : error ? (
            <div className="bg-red-100 text-red-700 p-4 rounded-xl">{error}</div>
          ) : (
            <div className="grid md:grid-cols-2 gap-8">
              <OrderForm menu={menu} editingOrder={editingOrder} setEditingOrder={setEditingOrder} onSuccess={notifySuccess} onError={notifyError} />
              <OrderList orders={orders} onEdit={setEditingOrder} onSuccess={notifySuccess} onError={notifyError} />
            </div>
          )}
        </div>
      );
    }

    function OrderForm({ menu, editingOrder, setEditingOrder, onSuccess, onError }) {
      const [formData, setFormData] = useState({ name: "", drink: "", sugar: "正常糖", ice: "正常冰", quantity: 1 });

      useEffect(() => {
        if (editingOrder) setFormData(editingOrder);
      }, [editingOrder]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const selectedDrink = menu.find(m => m.name === formData.drink);
        const totalPrice = selectedDrink ? selectedDrink.price * formData.quantity : 0;
        
        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: editingOrder ? 'update' : 'create',
              data: { ...formData, totalPrice, orderId: editingOrder?.orderId }
            })
          });
          const result = await res.json();
          if (result.status === 'success') {
            onSuccess(result.message);
            setFormData({ name: "", drink: "", sugar: "正常糖", ice: "正常冰", quantity: 1 });
            setEditingOrder(null);
          } else throw new Error(result.message);
        } catch (err) { onError(err.message); }
      };

      return (
        <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <h2 className="text-xl font-bold">{editingOrder ? "修改訂單" : "新訂單"}</h2>
          <input type="text" placeholder="訂購人姓名" className="w-full p-3 border rounded-lg" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required />
          <select className="w-full p-3 border rounded-lg" value={formData.drink} onChange={e => setFormData({...formData, drink: e.target.value})} required>
            <option value="">選擇飲料</option>
            {menu.map(m => <option key={m.name} value={m.name}>{m.name} (${m.price})</option>)}
          </select>
          {/* Sugar/Ice buttons and Quantity would go here - simplified for brevity */}
          <button className="w-full bg-sky-600 text-white p-3 rounded-lg font-bold hover:bg-sky-700">{editingOrder ? "更新" : "送出"}</button>
        </form>
      );
    }

    function OrderList({ orders, onEdit, onSuccess, onError }) {
        const handleDelete = async (orderId) => {
            if(!confirm("確定刪除嗎？")) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', data: { orderId }}) });
                const result = await res.json();
                if(result.status === 'success') onSuccess(result.message);
                else throw new Error(result.message);
            } catch(err) { onError(err.message); }
        }

        return (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold">今日訂單</h2>
                    {orders.length > 0 && <button onClick={() => downloadCSV(orders)} className="text-sm bg-slate-100 px-3 py-1 rounded-full text-slate-600 hover:bg-slate-200">下載 CSV</button>}
                </div>
                {orders.length === 0 ? 
                    <div className="text-center py-10 text-slate-400">目前無人訂購</div> :
                    orders.map(o => (
                        <div key={o.orderId} className="flex justify-between items-center border-b py-3">
                           <div><div className="font-bold">{o.drink} - {o.name}</div><div className="text-sm text-slate-500">{o.quantity}杯 / ${o.totalPrice}</div></div>
                           <div className="flex gap-2"><button onClick={() => onEdit(o)} className="text-sky-600">編輯</button><button onClick={() => handleDelete(o.orderId)} className="text-red-500">刪除</button></div>
                        </div>
                    ))
                }
            </div>
        )
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
